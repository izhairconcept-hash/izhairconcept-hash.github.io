<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi VIP | Iz Hair Concept</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #000000; 
            color: #D4AF37; 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            margin: 0;
        }

        .container { max-width: 400px; margin: 0 auto; }
        .logo { width: 180px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 24px; text-transform: uppercase; letter-spacing: 3px; }
        p { color: #ffffff; font-size: 14px; margin-bottom: 40px; font-weight: 300; }

        .btn { 
            display: block; width: 100%; padding: 18px; margin: 15px 0;
            border: 1px solid #D4AF37; color: #D4AF37; text-decoration: none; 
            font-size: 13px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 2px; transition: all 0.4s ease;
            box-sizing: border-box;
        }

        .btn:hover { background-color: #D4AF37; color: #000; }

        /* Painel de Senha (Escondido) */
        #dadosWifi { 
            display: none; 
            margin-top: 30px;
            padding: 20px;
            border: 1px double #D4AF37;
            background: rgba(212, 175, 55, 0.05);
            animation: fadeIn 1s ease-in;
        }

        .info-label { color: #888; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { color: #D4AF37; font-size: 18px; font-weight: 600; margin-bottom: 15px; letter-spacing: 1px; }

        #wifiBtn { background-color: #D4AF37; color: #000; border: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://izhairconcept.com.br/logo.png" alt="Iz Hair Concept" class="logo">
        
        <h1>Conexão VIP</h1>
        <p>Sua presença é um prazer.<br>Avalie nosso atendimento para liberar o acesso à rede.</p>

        <a href="https://search.google.com/local/writereview?placeid=ChIJdfcFBj2ZpgARpCJAiGMjte4" 
           target="_blank" class="btn" onclick="liberarAcesso()">
           1. Avaliar no Google
        </a>

        <div id="dadosWifi">
            <div class="info-label">Rede:</div>
            <div class="info-value">VIVO-E3D8</div>
            
            <div class="info-label">Senha:</div>
            <div class="info-value">75463215</div>

            <a href="WIFI:S:VIVO-E3D8;T:WPA;P:75463215;;" id="wifiBtn" class="btn">
                Conectar Automaticamente
            </a>
        </div>

        <footer style="margin-top: 50px; font-size: 10px; color: #444;">IZ HAIR CONCEPT</footer>
    </div>

    <script>
        function liberarAcesso() {
            setTimeout(function() {
                document.getElementById('dadosWifi').style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 2000);
        }
    </script>
</body>
</html>
